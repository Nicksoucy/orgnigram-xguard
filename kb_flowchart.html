<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XGuard System — Flowchart</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
  .title-bar { text-align: center; padding: 20px 20px 5px; }
  .title-bar h1 { font-size: 22px; color: #fff; } .title-bar h1 span { color: #60a5fa; }
  .title-bar p { color: #64748b; font-size: 11px; margin-top: 3px; }
  .tabs { display: flex; justify-content: center; gap: 6px; padding: 12px; }
  .tab { padding: 6px 16px; border-radius: 16px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid #334155; color: #94a3b8; background: #1e293b; transition: all 0.2s; }
  .tab:hover { border-color: #60a5fa; color: #e2e8f0; }
  .tab.active { background: #1e40af; border-color: #3b82f6; color: #fff; }
  .diagram-wrap { width: 100%; overflow-x: auto; padding: 10px 20px 30px; display: flex; justify-content: center; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="title-bar">
  <h1><span>XGuard</span> System Flowchart</h1>
  <p>Interactive data flow diagrams - click tabs to switch views</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="show('full')">Full System</div>
  <div class="tab" onclick="show('kb')">KB Pipeline</div>
  <div class="tab" onclick="show('sac')">SAC Daily</div>
  <div class="tab" onclick="show('approval')">Approval Flow</div>
</div>

<div class="diagram-wrap" id="d-full"><div id="m-full"></div></div>
<div class="diagram-wrap hidden" id="d-kb"><div id="m-kb"></div></div>
<div class="diagram-wrap hidden" id="d-sac"><div id="m-sac"></div></div>
<div class="diagram-wrap hidden" id="d-approval"><div id="m-approval"></div></div>

<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    darkMode: true, background: '#0f172a', primaryColor: '#1e40af',
    primaryTextColor: '#e2e8f0', primaryBorderColor: '#3b82f6', lineColor: '#475569',
    secondaryColor: '#064e3b', tertiaryColor: '#3b0764',
    fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif', fontSize: '12px',
  },
  flowchart: { htmlLabels: true, curve: 'basis', nodeSpacing: 30, rankSpacing: 40, padding: 12 }
});

const diagrams = {
full: `flowchart TD
  subgraph sources["DATA SOURCES"]

  end
  subgraph nightly["NIGHTLY CRONS - Nitro"]
    KBA["KB Analyzer<br/>23h - 1500/night<br/>5 Haiku workers"]
    SACD["SAC Daily v2<br/>19h - Fetch + Transcribe"]
    SMSS["SMS Stats<br/>sms_stats.py"]
  end
  subgraph ai["AI PROCESSING"]
    HCLASS["Haiku Classify<br/>category + question<br/>response + faq_topic"]
    GPU["GPU Whisper<br/>GTX 1650 CUDA<br/>~20s/call"]
    HSCORE["Haiku Scoring<br/>10 SAC dimensions<br/>score /10 + coaching"]
  end
  subgraph storage["SUPABASE"]
    KBE[("kb_emails<br/>~10k after 7 nights")]
    SAC_CALLS[("sac_calls<br/>2700+ transcripts")]
    SAC_CON[("sac_contacts<br/>1200+ unique")]
  end
  subgraph morning["MORNING 06h-07h30"]
    AGG["Topic Aggregator<br/>06h - 1 Haiku call<br/>Semantic merge"]
    KBT[("kb_topics<br/>Canonical FAQ<br/>pending/approved")]
  end
  subgraph output["OUTPUT"]
    MAIL_KB["KB Approval Email<br/>07h30 to Nick"]
    MAIL_SAC["Daily SAC Email<br/>19h to Hamza + Nick"]
  end
  subgraph humans["HUMAN REVIEW"]
    ADMIN["KB Admin Page<br/>Approve - Correct - Reject"]
    NICK["Nick<br/>Validates topics"]
    HAMZA["Hamza + Team<br/>Daily coaching"]
  end
  subgraph audit["AUDIT"]
    APPR[("kb_approvals<br/>Immutable log")]
    RUNLOG[("kb_run_log")]
    CRONLOG[("cron_logs")]
  end
  subgraph future["FUTURE Phase 4"]
    AUTO["Auto-Response AI<br/>High confidence = auto<br/>Medium = flag - Low = escalate"]
  end
  IMAP -->|"IMAP fetch"| KBA
  JC -->|"REST API"| SACD
  SMS -->|"SMS v2.1"| SMSS
  IMAP2 -->|"IMAP today"| MAIL_SAC
  KBA -->|"classify"| HCLASS
  SACD -->|"download mp3"| GPU
  GPU -->|"transcript FR"| HSCORE
  HCLASS -->|"upsert"| KBE
  HSCORE -->|"upsert"| SAC_CALLS
  SACD -->|"upsert"| SAC_CON
  KBE -->|"group by topic"| AGG
  AGG -->|"merge + upsert"| KBT
  SAC_CALLS -->|"scores + stats"| MAIL_SAC
  SMSS -->|"SMS analysis"| MAIL_SAC
  KBT -->|"pending topics"| MAIL_KB
  KBT -->|"all topics"| ADMIN
  MAIL_KB -->|"morning email"| NICK
  MAIL_SAC -->|"daily report"| HAMZA
  NICK -->|"approve/correct"| ADMIN
  ADMIN -->|"PATCH"| KBT
  ADMIN -->|"POST audit"| APPR
  KBA -->|"log run"| RUNLOG
  SACD -->|"log run"| CRONLOG
  KBT -.->|"approved topics"| AUTO
  style sources fill:#1e3a5f,stroke:#3b82f6,color:#fff
  style nightly fill:#064e3b,stroke:#10b981,color:#fff
  style ai fill:#3b0764,stroke:#a855f7,color:#fff
  style storage fill:#7f1d1d,stroke:#ef4444,color:#fff
  style morning fill:#064e3b,stroke:#10b981,color:#fff
  style output fill:#78350f,stroke:#f59e0b,color:#fff
  style humans fill:#1e3a5f,stroke:#3b82f6,color:#fff
  style audit fill:#1f2937,stroke:#6b7280,color:#9ca3af
  style future fill:#1e1b4b,stroke:#6366f1,color:#a5b4fc,stroke-dasharray: 5 5`,

kb: `flowchart TD
  IMAP["IMAP<br/>academie@academiexguard.ca<br/>272k emails"]
  KBA["KB Analyzer<br/>23h nightly on Nitro<br/>5 parallel Haiku workers"]
  PASS1["Pass 1: Fetch headers<br/>from 20 SAC folders<br/>~900 candidates"]
  PASS2["Pass 2: Check Supabase<br/>skip already analyzed"]

  EMAIL -->|"link"| ADMIN
  style IMAP fill:#1e3a5f,stroke:#3b82f6,color:#fff
  style KBA fill:#064e3b,stroke:#10b981,color:#fff
  style HAIKU fill:#3b0764,stroke:#a855f7,color:#fff
  style AGG fill:#064e3b,stroke:#10b981,color:#fff
  style KBE fill:#7f1d1d,stroke:#ef4444,color:#fff
  style KBT fill:#7f1d1d,stroke:#ef4444,color:#fff
  style EMAIL fill:#78350f,stroke:#f59e0b,color:#fff
  style ADMIN fill:#4c1d95,stroke:#8b5cf6,color:#fff
  style MERGE fill:#3b0764,stroke:#a855f7,color:#fff`,

sac: `flowchart TD
  JC["JustCall API<br/>academie@ 301418<br/>formateur@ 302145"]
  FETCH["Fetch calls<br/>duration >= 30s<br/>with recording"]
  ATTR["Agent Attribution<br/>notes + weekday + name detect<br/>Hamza - Lilia - Sekou"]

  style GPU fill:#3b0764,stroke:#a855f7,color:#fff
  style HAIKU fill:#3b0764,stroke:#a855f7,color:#fff
  style CALLS fill:#7f1d1d,stroke:#ef4444,color:#fff
  style CONTACTS fill:#7f1d1d,stroke:#ef4444,color:#fff
  style REPORT fill:#78350f,stroke:#f59e0b,color:#fff
  style HAMZA fill:#1e3a5f,stroke:#3b82f6,color:#fff`,

approval: `flowchart TD
  KBT[("kb_topics<br/>40 canonical topics<br/>15 pending")]
  EMAIL["Morning Email<br/>07h30 to Nick<br/>grouped by category"]
  NICK["Nick reads email<br/>sees new topics + examples<br/>+ suggested responses"]
  LINK["Clicks link to<br/>Admin Page"]
  ADMIN["kb_admin.html<br/>Loads all topics from Supabase<br/>Grouped by category"]
  APPROVE{"Decision?"}
  A_YES["APPROVE<br/>Response becomes official"]
  A_CORRECT["CORRECT<br/>Nick edits response<br/>then approves"]
  A_REJECT["REJECT<br/>Topic hidden<br/>wont appear again"]
  PATCH_T["PATCH kb_topics<br/>approval_status = approved<br/>approved_by = nick"]
  PATCH_C["PATCH kb_topics<br/>status = corrected<br/>nick_correction = new text"]
  PATCH_R["PATCH kb_topics<br/>approval_status = rejected"]
  AUDIT[("POST kb_approvals<br/>action + previous + corrected<br/>immutable audit log")]
  KB_FINAL[("Validated KB<br/>Approved + Corrected topics<br/>= Official knowledge base")]
  FUTURE["Future: Auto-Response<br/>powered by validated KB"]
  KBT --> EMAIL --> NICK --> LINK --> ADMIN
  ADMIN --> APPROVE
  APPROVE -->|"Good as-is"| A_YES
  APPROVE -->|"Needs edit"| A_CORRECT
  APPROVE -->|"Not relevant"| A_REJECT
  A_YES --> PATCH_T
  A_CORRECT --> PATCH_C

  PATCH_T --> AUDIT

  PATCH_R --> AUDIT
  PATCH_T --> KB_FINAL

  KB_FINAL -.-> FUTURE
  style KBT fill:#7f1d1d,stroke:#ef4444,color:#fff
  style EMAIL fill:#78350f,stroke:#f59e0b,color:#fff
  style NICK fill:#1e3a5f,stroke:#3b82f6,color:#fff
  style ADMIN fill:#4c1d95,stroke:#8b5cf6,color:#fff
  style APPROVE fill:#1e293b,stroke:#94a3b8,color:#fff
  style A_YES fill:#064e3b,stroke:#10b981,color:#fff
  style A_CORRECT fill:#1e3a5f,stroke:#3b82f6,color:#fff
  style A_REJECT fill:#7f1d1d,stroke:#ef4444,color:#fff
  style AUDIT fill:#1f2937,stroke:#6b7280,color:#9ca3af

};

// Render all diagrams at init
async function renderAll() {
  for (const [id, def] of Object.entries(diagrams)) {
    try {
      const { svg } = await mermaid.render('graph-' + id, def);
      document.getElementById('m-' + id).innerHTML = svg;
    } catch(e) {
      document.getElementById('m-' + id).innerHTML = '<p style="color:#f87171;">Error: ' + e.message + '</p>';
    }
  }
}
renderAll();

function show(id) {
  document.querySelectorAll('.diagram-wrap').forEach(d => d.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('d-' + id).classList.remove('hidden');
  event.target.classList.add('active');
}
</script>
</body>
</html>
