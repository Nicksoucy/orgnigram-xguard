<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XGuard — Org Chart + Future Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0f;--s:#16161a;--sh:#1e1e24;--b:#2a2a32;--ba:#3d3d48;
  --t:#e8e6e3;--td:#8b8a87;--a:#ff6b35;--ag:rgba(255,107,53,0.15);
  --g:#34d399;--bl:#60a5fa;--p:#a78bfa;--y:#fbbf24;--r:#f87171;--cy:#22d3ee;--pk:#f472b6;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding-bottom:70px;}
.grain{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");}

header{padding:28px 32px 14px;border-bottom:1px solid var(--b);}
header .tag{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--a);margin-bottom:5px;}
header h1{font-size:26px;font-weight:700;}
header p{color:var(--td);margin-top:3px;font-size:13px;}

/* View Tabs */
.view-tabs{padding:12px 32px;border-bottom:1px solid var(--b);display:flex;gap:4px;}
.vtab{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 20px;border-radius:8px 8px 0 0;
  border:1px solid transparent;border-bottom:none;background:transparent;color:var(--td);cursor:pointer;transition:all 0.2s;position:relative;bottom:-1px;}
.vtab:hover{color:var(--t);}
.vtab.active{background:var(--s);border-color:var(--b);color:var(--a);border-bottom:1px solid var(--s);}
.vtab .tab-icon{margin-right:6px;}

.controls{padding:12px 32px;display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 16px;border-radius:6px;
  border:1px solid var(--b);background:var(--s);color:var(--t);cursor:pointer;transition:all 0.2s;}
.btn:hover{background:var(--sh);border-color:var(--ba);}
.btn.primary{background:var(--a);border-color:var(--a);color:#fff;}
.btn.primary:hover{opacity:0.85;}
.btn.danger{border-color:var(--r);color:var(--r);}
.btn.future-btn{border-color:var(--cy);color:var(--cy);}
.btn.future-btn:hover{background:rgba(34,211,238,0.1);}

.content{padding:24px 32px 40px;}

/* === VIEW 1: DEPARTMENTS === */
.dept-grid{display:flex;flex-direction:column;gap:20px;}
.dept{background:var(--s);border:1px solid var(--b);border-radius:12px;overflow:hidden;}
.dept-h{padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--b);cursor:pointer;user-select:none;}
.dept-h:hover{background:var(--sh);}
.dept-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dept-h h3{font-size:14px;font-weight:600;flex:1;}
.dept-h .cnt{font-family:'Space Mono',monospace;font-size:10px;color:var(--td);background:var(--bg);padding:2px 10px;border-radius:10px;}
.dept-h .chev{color:var(--td);transition:transform 0.2s;font-size:13px;}
.dept.collapsed .chev{transform:rotate(-90deg);}
.dept.collapsed .dept-body{display:none;}
.dept-body{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}

/* === VIEW 2: HIERARCHY TREE === */
.tree{padding:0;}
.tree-node{margin-left:0;}
.tree-children{margin-left:32px;border-left:2px solid var(--b);padding-left:0;}
.tree-item{display:flex;align-items:stretch;margin-bottom:4px;}
.tree-branch{width:24px;flex-shrink:0;position:relative;}
.tree-branch::before{content:'';position:absolute;top:50%;left:0;width:24px;height:2px;background:var(--b);}
.tree-card{flex:1;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:10px 14px;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px;}
.tree-card:hover{border-color:var(--ba);background:var(--sh);}
.tree-card.is-vp{border-color:var(--a);box-shadow:0 0 20px var(--ag);}
.tree-card.is-lead{border-color:var(--g);box-shadow:0 0 12px rgba(52,211,153,0.08);}
.tree-card .tc-info{flex:1;}
.tree-card .tc-name{font-size:13px;font-weight:600;}
.tree-card .tc-role{font-size:10px;color:var(--td);}
.tree-card .tc-tags{margin-top:3px;}
.tree-card .tc-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--td);
  background:var(--bg);padding:2px 8px;border-radius:8px;}
.tree-root>.tree-card{margin-bottom:8px;}

/* === VIEW 3: FUTURE STATE === */
.future-container{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.future-col{background:var(--s);border:1px solid var(--b);border-radius:12px;overflow:hidden;}
.future-col-header{padding:14px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;}
.future-col-header h3{font-size:14px;font-weight:600;flex:1;}
.future-col-header .state-badge{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:2px;padding:3px 10px;border-radius:4px;}
.state-current{background:rgba(96,165,250,0.15);color:var(--bl);}
.state-future{background:rgba(34,211,238,0.15);color:var(--cy);}
.future-col-body{padding:14px;min-height:200px;}
.future-person{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:10px 14px;
  margin-bottom:8px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:10px;}
.future-person:hover{border-color:var(--ba);}
.future-person .fp-name{font-size:12px;font-weight:600;flex:1;}
.future-person .fp-role{font-size:10px;color:var(--td);}
.future-person .fp-arrow{font-size:14px;color:var(--td);}
.future-change{background:var(--bg);border:1px solid var(--cy);border-radius:8px;padding:12px 14px;margin-bottom:8px;}
.future-change .fc-label{font-size:10px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--cy);margin-bottom:4px;}
.future-change .fc-from{font-size:11px;color:var(--r);text-decoration:line-through;margin-bottom:2px;}
.future-change .fc-to{font-size:11px;color:var(--g);}
.future-change .fc-name{font-size:13px;font-weight:600;margin-bottom:4px;}

/* CARDS (shared) */
.card{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all 0.2s;}
.card:hover{border-color:var(--ba);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.card .name{font-size:13px;font-weight:600;}
.card .role-line{font-size:10px;color:var(--td);margin-top:1px;}
.card .meta{font-size:10px;color:var(--td);line-height:1.5;margin-top:3px;}
.badge{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:1.5px;
  padding:2px 6px;border-radius:3px;display:inline-block;}
.b-exec{background:rgba(255,107,53,0.15);color:var(--a);}
.b-lead{background:rgba(52,211,153,0.15);color:var(--g);}
.b-emp{background:rgba(96,165,250,0.15);color:var(--bl);}
.b-con{background:rgba(167,139,250,0.15);color:var(--p);}
.tp{font-size:8px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px;
  padding:1px 6px;border-radius:3px;display:inline-block;margin-right:3px;margin-bottom:2px;}
.t-bsp{background:rgba(96,165,250,0.12);color:var(--bl);}
.t-rcr{background:rgba(52,211,153,0.12);color:var(--g);}
.t-elite{background:rgba(251,191,36,0.12);color:var(--y);}
.t-cv{background:rgba(167,139,250,0.12);color:var(--p);}
.t-drone{background:rgba(34,211,238,0.12);color:var(--cy);}
.t-sac{background:rgba(244,114,182,0.12);color:var(--pk);}
.t-mkt{background:rgba(255,107,53,0.12);color:var(--a);}
.t-sales{background:rgba(251,191,36,0.12);color:var(--y);}
.note-line{font-size:10px;color:var(--td);border-top:1px solid var(--b);padding-top:5px;margin-top:5px;font-style:italic;}

/* Summary */
.summary-bar{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);
  padding:10px 32px;display:flex;gap:24px;font-size:11px;z-index:100;}
.stat{display:flex;align-items:center;gap:5px;}
.stat .d{width:6px;height:6px;border-radius:50%;}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;
  align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.mo.active{display:flex;}
.modal{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:22px;
  width:460px;max-width:92vw;max-height:85vh;overflow-y:auto;}
.modal h2{font-size:16px;margin-bottom:14px;}
.modal label{display:block;font-size:10px;font-weight:500;color:var(--td);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:4px;margin-top:10px;}
.modal label:first-of-type{margin-top:0;}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border-radius:6px;
  border:1px solid var(--b);background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--a);}
.modal textarea{resize:vertical;min-height:45px;}
.cg{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.cg label{font-size:11px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:5px;
  cursor:pointer;color:var(--t);margin:0;padding:3px 9px;border:1px solid var(--b);border-radius:6px;}
.cg label:hover{border-color:var(--ba);}
.cg input[type="checkbox"]{width:auto;accent-color:var(--a);}
.mbtn{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.empty{text-align:center;padding:24px;color:var(--td);font-size:12px;}

@media(max-width:768px){.future-container{grid-template-columns:1fr;}}

/* === VIEW 5: TASKS & OUTCOMES === */
.tasks-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.tasks-filters input{font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 12px;border-radius:6px;
  border:1px solid var(--b);background:var(--s);color:var(--t);outline:none;width:200px;}
.tasks-filters input:focus{border-color:var(--a);}
.tasks-filters select{font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;border-radius:6px;
  border:1px solid var(--b);background:var(--s);color:var(--t);outline:none;cursor:pointer;}
.tasks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.tk-card{background:var(--s);border:1px solid var(--b);border-radius:10px;overflow:hidden;}
.tk-card.tk-vp{border-color:var(--a);}
.tk-card.tk-lead{border-color:var(--g);}
.tk-head{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--b);}
.tk-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.tk-head-info{flex:1;min-width:0;}
.tk-head-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tk-head-role{font-size:10px;color:var(--td);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tk-body{padding:12px 14px;}
.tk-section{margin-bottom:10px;}
.tk-section:last-child{margin-bottom:0;}
.tk-label{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--td);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.tk-label .tk-add{cursor:pointer;color:var(--a);font-size:14px;line-height:1;padding:0 2px;}
.tk-label .tk-add:hover{opacity:0.7;}
.tk-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;group:true;}
.tk-item input[type="checkbox"]{margin-top:2px;accent-color:var(--a);flex-shrink:0;cursor:pointer;}
.tk-item-text{font-size:11px;line-height:1.5;flex:1;cursor:pointer;word-break:break-word;}
.tk-item-text.done{text-decoration:line-through;color:var(--td);}
.tk-item .tk-del{color:var(--td);font-size:13px;cursor:pointer;opacity:0;transition:opacity 0.15s;flex-shrink:0;padding:0 2px;}
.tk-item:hover .tk-del{opacity:1;}
.tk-item .tk-del:hover{color:var(--r);}
.tk-outcome{background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:6px 10px;
  margin-bottom:5px;font-size:11px;line-height:1.5;display:flex;align-items:flex-start;gap:7px;cursor:pointer;}
.tk-outcome .tk-o-icon{color:var(--cy);flex-shrink:0;font-size:12px;margin-top:1px;}
.tk-outcome .tk-o-text{flex:1;word-break:break-word;}
.tk-outcome .tk-del{color:var(--td);font-size:13px;cursor:pointer;opacity:0;transition:opacity 0.15s;flex-shrink:0;}
.tk-outcome:hover .tk-del{opacity:1;}
.tk-outcome .tk-del:hover{color:var(--r);}
.tk-empty{font-size:10px;color:var(--td);font-style:italic;padding:2px 0;}
.tk-inline-input{width:100%;font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 8px;border-radius:5px;
  border:1px solid var(--a);background:var(--bg);color:var(--t);outline:none;margin-top:4px;box-sizing:border-box;}
.tk-expected{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);border-radius:6px;padding:6px 10px;
  margin-bottom:5px;font-size:11px;line-height:1.5;display:flex;align-items:flex-start;gap:7px;cursor:pointer;}
.tk-expected .tk-o-icon{color:var(--y);flex-shrink:0;font-size:11px;margin-top:1px;}
.tk-expected .tk-o-text{flex:1;word-break:break-word;}
.tk-expected .tk-del{color:var(--td);font-size:13px;cursor:pointer;opacity:0;transition:opacity 0.15s;flex-shrink:0;}
.tk-expected:hover .tk-del{opacity:1;}
.tk-expected .tk-del:hover{color:var(--r);}
.tk-section-divider{border:none;border-top:1px solid var(--b);margin:10px 0;}
.tasks-progress{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;
  background:var(--s);border:1px solid var(--b);border-radius:8px;font-size:11px;}
.tasks-progress .tp-bar{flex:1;height:6px;background:var(--b);border-radius:3px;overflow:hidden;}
.tasks-progress .tp-fill{height:100%;background:var(--a);border-radius:3px;transition:width 0.3s;}
.tasks-progress .tp-label{color:var(--td);white-space:nowrap;}

/* === VIEW 4: CANVAS TREE === */
#canvas-wrap{position:relative;width:100%;overflow:scroll;background:var(--bg);cursor:grab;user-select:none;}
#canvas-wrap.dragging{cursor:grabbing;}
#canvas-stage{position:relative;transform-origin:0 0;will-change:transform;}
#canvas-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
.cn{position:absolute;width:160px;background:var(--s);border:1px solid var(--b);border-radius:10px;
  padding:10px 12px;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s;box-sizing:border-box;}
.cn:hover{border-color:var(--ba);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.cn.cn-vp{border-color:var(--a);box-shadow:0 0 24px var(--ag);}
.cn.cn-lead{border-color:var(--g);box-shadow:0 0 14px rgba(52,211,153,0.12);}
.cn .cn-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;margin:0 auto 7px;color:#fff;flex-shrink:0;}
.cn .cn-name{font-size:11px;font-weight:700;text-align:center;line-height:1.3;margin-bottom:2px;}
.cn .cn-role{font-size:9px;color:var(--td);text-align:center;line-height:1.4;margin-bottom:5px;}
.cn .cn-badges{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;}
.cn .cn-di{text-align:center;font-size:11px;margin-top:4px;}
.cn-zoom{display:flex;gap:5px;margin-left:auto;}
.cn-arrows{display:flex;justify-content:space-between;margin-top:5px;opacity:0;transition:opacity 0.15s;}
.cn:hover .cn-arrows{opacity:1;}
.cn-arr{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--b);color:var(--t);cursor:pointer;transition:background 0.15s;user-select:none;}
.cn-arr:hover{background:var(--a);color:#fff;}
.cn-arr.disabled{opacity:0.2;cursor:default;pointer-events:none;}
</style>
</head>
<body>
<div class="grain"></div>
<header>
  <div class="tag">Training Division — Org Chart</div>
  <h1>XGuard</h1>
  <p>22 team members. Three views: by department, by reporting hierarchy, and a future-state planner.</p>
</header>

<div class="view-tabs">
  <button class="vtab active" onclick="switchView('dept',this)"><span class="tab-icon">📊</span>By Department</button>
  <button class="vtab" onclick="switchView('tree',this)"><span class="tab-icon">🌳</span>Reporting Hierarchy</button>
  <button class="vtab" onclick="switchView('future',this)"><span class="tab-icon">🚀</span>Future State</button>
  <button class="vtab" onclick="switchView('canvas',this)"><span class="tab-icon">🗺️</span>Canvas View</button>
  <button class="vtab" onclick="switchView('tasks',this)"><span class="tab-icon">✅</span>Tasks & Outcomes</button>
</div>

<div class="controls" id="controls"></div>
<div class="content" id="content"></div>
<div class="summary-bar" id="sum"></div>

<!-- Edit Modal -->
<div class="mo" id="mo">
  <div class="modal">
    <h2 id="mTitle">Edit</h2>
    <label>Name</label><input id="fName"/>
    <label>Email</label><input id="fEmail"/>
    <label>Title / Role</label><input id="fRole"/>
    <label>Type</label>
    <select id="fType"><option value="contractor">Contractor</option><option value="employee">Employee</option><option value="lead">Lead</option></select>
    <label>Department</label>
    <select id="fDept"><option value="training">Training</option><option value="sac">Service clientèle</option><option value="marketing">Marketing</option><option value="sales">Sales</option></select>
    <label>Reports To</label>
    <select id="fReports"></select>
    <label>Programs</label>
    <div class="cg" id="fProg">
      <label><input type="checkbox" value="BSP"/>BSP</label><label><input type="checkbox" value="RCR"/>RCR</label>
      <label><input type="checkbox" value="Élite"/>Élite</label><label><input type="checkbox" value="CV"/>CV</label>
      <label><input type="checkbox" value="Drone"/>Drone</label><label><input type="checkbox" value="SAC"/>Svc Client</label>
      <label><input type="checkbox" value="MKT"/>Marketing</label><label><input type="checkbox" value="Sales"/>Sales</label>
    </div>
    <label>Location(s)</label>
    <div class="cg" id="fLoc">
      <label><input type="checkbox" value="Montréal"/>Montréal</label>
      <label><input type="checkbox" value="Ligne"/>En ligne</label>
      <label><input type="checkbox" value="Québec"/>Québec</label>
    </div>
    <label>Schedule</label><input id="fSched"/>
    <label>Notes</label><textarea id="fNotes"></textarea>
    <label>Delegation Capacity</label>
    <select id="fDel"><option value="unknown">Not assessed</option><option value="yes">🟢 Can take more</option>
      <option value="partial">🟡 Partial</option><option value="no">🔴 Maxed out</option></select>
    <div class="mbtn">
      <button class="btn" onclick="closeM()">Cancel</button>
      <button class="btn danger" id="bDel" onclick="delP()" style="display:none;">Delete</button>
      <button class="btn primary" onclick="saveP()">Save</button>
    </div>
  </div>
</div>

<!-- Future Edit Modal -->
<div class="mo" id="fmo">
  <div class="modal">
    <h2 id="fmTitle">Plan Future Change</h2>
    <label>Person</label>
    <select id="ffPerson"></select>
    <label>Future Reports To</label>
    <select id="ffReports"></select>
    <label>Future Role / Title</label>
    <input id="ffRole"/>
    <label>Future Type</label>
    <select id="ffType"><option value="contractor">Contractor</option><option value="employee">Employee</option><option value="lead">Lead</option></select>
    <label>Notes / Rationale</label>
    <textarea id="ffNotes" placeholder="Why this change? What outcome does it enable?"></textarea>
    <div class="mbtn">
      <button class="btn" onclick="closeFM()">Cancel</button>
      <button class="btn danger" id="bFDel" onclick="delFChange()" style="display:none;">Remove Change</button>
      <button class="btn future-btn" onclick="saveFChange()">Save Change</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================

// ==================== VIEW SWITCHING ====================
function switchView(v,btn){
  currentView=v;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ==================== RENDER ====================
function render(){
  const ct=document.getElementById('content');
  const cl=document.getElementById('controls');

  if(currentView==='dept') renderDept(ct,cl);
  else if(currentView==='tree') renderTree(ct,cl);
  else if(currentView==='canvas') renderCanvas(ct,cl);
  else if(currentView==='tasks') renderTasks(ct,cl);
  else renderFuture(ct,cl);

  renderSummary();
}

function cardHTML(p){
  const tags=p.programs.map(pr=>`<span class="tp ${TC[pr]||'t-bsp'}">${pr}</span>`).join('');
  return `<div class="card" onclick="openEdit('${p.id}')">
    <span class="badge ${bc(p.type)}">${bl(p.type)}</span>
    <div class="name" style="margin-top:3px;">${esc(p.name)}</div>
    <div class="role-line">${esc(p.role)}</div>
    <div class="meta"><div style="margin-bottom:2px;">${tags}</div>
    <span>🕐 ${esc(p.schedule)}</span> <span>${di(p.delegatable)}</span></div>
    ${p.notes?`<div class="note-line">📝 ${esc(p.notes)}</div>`:''}
  </div>`;
}

// --- TREE VIEW ---
function renderTree(ct,cl){
  cl.innerHTML=`<button class="btn primary" onclick="openAdd()">+ Add Person</button>
    <span style="flex:1"></span><button class="btn" onclick="expJSON()">Export JSON</button>`;

  function buildNode(person,isRoot){
    const children=getChildren(person.id);
    const cls=person.id==='vp'?'is-vp':person.type==='lead'?'is-lead':'';
    const childCount=children.length?`<span class="tc-count">${children.length} report${children.length>1?'s':''}</span>`:'';
    const tags=person.programs?person.programs.map(pr=>`<span class="tp ${TC[pr]||''}">${pr}</span>`).join(''):'';
    const onclick=person.id==='vp'?'':`onclick="openEdit('${person.id}')"`;

    let h=`<div class="${isRoot?'tree-root':'tree-item'}">`;
    if(!isRoot) h+=`<div class="tree-branch"></div>`;
    h+=`<div class="tree-card ${cls}" ${onclick}>
      <div class="tc-info">
        <span class="badge ${bc(person.type)}">${bl(person.type)}</span>
        <div class="tc-name" style="margin-top:2px;">${esc(person.name)}</div>
        <div class="tc-role">${esc(person.role||'')}</div>
        ${tags?`<div class="tc-tags">${tags}</div>`:''}
      </div>
      ${childCount} <span>${di(person.delegatable||'no')}</span>
    </div></div>`;

    if(children.length){
      h+=`<div class="tree-children">`;
      children.forEach(c=>{ h+=buildNode(c,false); });
      h+=`</div>`;
    }
    return h;
  }

  ct.innerHTML=`<div class="tree">${buildNode(VP,true)}</div>`;
}

// --- FUTURE VIEW ---
function renderFuture(ct,cl){
  cl.innerHTML=`<button class="btn future-btn" onclick="openFM()">+ Plan a Change</button>
    <span style="flex:1"></span><button class="btn" onclick="expFutureJSON()">Export Future Plan</button>`;

  // Current hierarchy (left)
  function miniTree(pid,depth){
    const children=getChildren(pid);
    const p=getById(pid);
    let h='';
    children.forEach(c=>{
      const fc=futureChanges.find(f=>f.personId===c.id);
      const changed=fc?'border-color:var(--cy);':'';
      h+=`<div style="margin-left:${depth*20}px;margin-bottom:6px;">
        <div class="future-person" style="${changed}" onclick="openEdit('${c.id}')">
          <span class="badge ${bc(c.type)}" style="flex-shrink:0;">${bl(c.type)}</span>
          <div style="flex:1;"><div class="fp-name">${esc(c.name)}</div><div class="fp-role">${esc(c.role)}</div></div>
          <span>${di(c.delegatable)}</span>
        </div>
        ${miniTree(c.id,depth+1)}
      </div>`;
    });
    return h;
  }

  // Future changes list (right)
  let changesHTML='';
  if(futureChanges.length===0){
    changesHTML=`<div class="empty">No changes planned yet.<br><br>Click "+ Plan a Change" to start building your future org structure.<br><br>
      Think about:<br>• Who should trainers report to instead of you?<br>• Can Marc Éric or Marie-Claude become leads?<br>• What outcomes can Hamza own?</div>`;
  } else {
    futureChanges.forEach((fc,i)=>{
      const p=getById(fc.personId);
      const curManager=getById(p.reportsTo)||VP;
      const futManager=getById(fc.futureReportsTo)||VP;
      changesHTML+=`<div class="future-change" onclick="editFChange(${i})" style="cursor:pointer;">
        <div class="fc-name">${esc(p.name)}</div>
        ${fc.futureReportsTo!==p.reportsTo?`<div class="fc-label">Reports To</div>
          <div class="fc-from">Currently: ${esc(curManager.name)}</div>
          <div class="fc-to">→ Future: ${esc(futManager.name)}</div>`:''}
        ${fc.futureRole&&fc.futureRole!==p.role?`<div class="fc-label" style="margin-top:6px;">Role</div>
          <div class="fc-from">Currently: ${esc(p.role)}</div>
          <div class="fc-to">→ Future: ${esc(fc.futureRole)}</div>`:''}
        ${fc.futureType&&fc.futureType!==p.type?`<div class="fc-label" style="margin-top:6px;">Type</div>
          <div class="fc-from">Currently: ${bl(p.type)}</div>
          <div class="fc-to">→ Future: ${bl(fc.futureType)}</div>`:''}
        ${fc.notes?`<div style="margin-top:6px;font-size:10px;color:var(--td);font-style:italic;">💡 ${esc(fc.notes)}</div>`:''}
      </div>`;
    });
  }

  ct.innerHTML=`<div class="future-container">
    <div class="future-col">
      <div class="future-col-header">
        <h3>Current State</h3><span class="state-badge state-current">Now</span>
      </div>
      <div class="future-col-body">
        <div class="future-person" style="border-color:var(--a);">
          <span class="badge b-exec">VP</span>
          <div style="flex:1;"><div class="fp-name">You</div><div class="fp-role">VP of Training</div></div>
          <span class="tc-count">${getChildren('vp').length} direct</span>
        </div>
        ${miniTree('vp',1)}
      </div>
    </div>
    <div class="future-col">
      <div class="future-col-header">
        <h3>Planned Changes</h3><span class="state-badge state-future">${futureChanges.length} change${futureChanges.length!==1?'s':''}</span>
      </div>
      <div class="future-col-body">${changesHTML}</div>
    </div>
  </div>`;
}

function tkData(id){ if(!tasksData[id]) tasksData[id]={tasks:[],outcomes:[],expectedOutcomes:[]}; if(!tasksData[id].expectedOutcomes) tasksData[id].expectedOutcomes=[]; return tasksData[id]; }
function gTaskId(){ return 'tk_'+Math.random().toString(36).substr(2,7); }

function renderTasks(ct,cl){
  cl.innerHTML=`
    <div class="tasks-filters">
      <input id="tk-search" placeholder="Search people…" oninput="tkSetFilter(this.value)" value="${esc(_tkFilter)}"/>
      <select onchange="tkSetDept(this.value)">
        <option value="all" ${_tkDept==='all'?'selected':''}>All Departments</option>
        <option value="training" ${_tkDept==='training'?'selected':''}>Training</option>
        <option value="sac" ${_tkDept==='sac'?'selected':''}>Service à la clientèle</option>
        <option value="marketing" ${_tkDept==='marketing'?'selected':''}>Marketing</option>
        <option value="sales" ${_tkDept==='sales'?'selected':''}>Sales</option>
      </select>
      <span style="flex:1"></span>
      <button class="btn" onclick="expTasksJSON()">Export JSON</button>
    </div>`;

  const all=[VP,...data];
  const filtered=all.filter(p=>{
    const matchName=p.name.toLowerCase().includes(_tkFilter.toLowerCase())||p.role.toLowerCase().includes(_tkFilter.toLowerCase());
    const matchDept=_tkDept==='all'||p.dept===_tkDept||(_tkDept==='training'&&p.id==='vp');
    return matchName&&matchDept;
  });

  // progress bar across all tasks
  const allTasks=Object.values(tasksData).flatMap(d=>d.tasks||[]);
  const done=allTasks.filter(t=>t.done).length;
  const total=allTasks.length;
  const pct=total?Math.round(done/total*100):0;

  let html=`<div class="tasks-progress">
    <span style="color:var(--td);">Overall tasks</span>
    <div class="tp-bar"><div class="tp-fill" style="width:${pct}%"></div></div>
    <span class="tp-label">${done}/${total} done (${pct}%)</span>
  </div>
  <div class="tasks-grid">`;

  filtered.forEach(p=>{
    const d=tkData(p.id);
    const col=avatarColor(p.id);
    const cls=p.id==='vp'?'tk-vp':p.type==='lead'?'tk-lead':'';
    const doneCnt=d.tasks.filter(t=>t.done).length;
    const totalCnt=d.tasks.length;
    const pctP=totalCnt?Math.round(doneCnt/totalCnt*100):0;

    const tasksHTML=d.tasks.length
      ? d.tasks.map(t=>`
        <div class="tk-item">
          <input type="checkbox" ${t.done?'checked':''} onchange="tkToggle('${p.id}','${t.id}',this.checked)"/>
          <span class="tk-item-text${t.done?' done':''}" onclick="tkEditItem('${p.id}','${t.id}','task')">${esc(t.text)}</span>
          <span class="tk-del" onclick="tkDelItem('${p.id}','${t.id}','task')">×</span>
        </div>`).join('')
      : `<div class="tk-empty">No tasks yet</div>`;

    const outcomesHTML=d.outcomes.length
      ? d.outcomes.map(o=>`
        <div class="tk-outcome">
          <span class="tk-o-icon">◆</span>
          <span class="tk-o-text" onclick="tkEditItem('${p.id}','${o.id}','outcome')">${esc(o.text)}</span>
          <span class="tk-del" onclick="tkDelItem('${p.id}','${o.id}','outcome')">×</span>
        </div>`).join('')
      : `<div class="tk-empty">None defined yet</div>`;

    // Expected by VP — only shown on non-VP cards
    const expHTML= p.id!=='vp' ? (d.expectedOutcomes.length
      ? d.expectedOutcomes.map(o=>`
        <div class="tk-expected">
          <span class="tk-o-icon">◇</span>
          <span class="tk-o-text" onclick="tkEditItem('${p.id}','${o.id}','expected')">${esc(o.text)}</span>
          <span class="tk-del" onclick="tkDelItem('${p.id}','${o.id}','expected')">×</span>
        </div>`).join('')
      : `<div class="tk-empty">Nothing set yet</div>`) : null;

    html+=`<div class="tk-card ${cls}" id="tkc-${p.id}">
      <div class="tk-head">
        <div class="tk-avatar" style="background:${col};">${initials(p.name)}</div>
        <div class="tk-head-info">
          <div class="tk-head-name">${esc(p.name)}</div>
          <div class="tk-head-role">${esc(p.role)}</div>
        </div>
        ${totalCnt?`<span style="font-family:'Space Mono',monospace;font-size:9px;color:${pctP===100?'var(--g)':'var(--td)'};">${pctP}%</span>`:''}
      </div>
      <div class="tk-body">

          <div class="tk-label">Tasks
            <span class="tk-add" onclick="tkAddInline('${p.id}','task')" title="Add task">＋</span>
          </div>

        <div class="tk-section">
          <div class="tk-label" style="color:var(--g);">◆ Their Outcomes
            <span class="tk-add" onclick="tkAddInline('${p.id}','outcome')" title="Add outcome">＋</span>
          </div>
          <div id="tklist-${p.id}-out">${outcomesHTML}</div>
          <div id="tkinput-${p.id}-outcome"></div>
        </div>
        ${expHTML!==null?`
        <hr class="tk-section-divider"/>
        <div class="tk-section">
          <div class="tk-label" style="color:var(--y);">◇ Expected by VP
            <span class="tk-add" onclick="tkAddInline('${p.id}','expected')" title="Add expectation">＋</span>

          <div id="tkinput-${p.id}-expected"></div>
        </div>`:''}

  });

  html+=`</div>`;

}

function tkToggle(pid,tid,checked){
  const t=tkData(pid).tasks.find(x=>x.id===tid);
  if(t){ t.done=checked; renderTasks(document.getElementById('content'),document.getElementById('controls')); }
}

function tkAddInline(pid,kind){
  const slotId=`tkinput-${pid}-${kind}`;
  const slot=document.getElementById(slotId);
  if(!slot||slot.querySelector('input')) return;
  const inp=document.createElement('input');
  inp.className='tk-inline-input';
  const ph={task:'New task…',outcome:'Their outcome…',expected:'Expected by VP…'};
  inp.placeholder=ph[kind]||'New item…';
  inp.onkeydown=e=>{
    if(e.key==='Enter'&&inp.value.trim()){
      const d=tkData(pid);
      const newItem={id:gTaskId(),text:inp.value.trim()};
      if(kind==='task'){newItem.done=false;d.tasks.push(newItem);}
      else if(kind==='outcome') d.outcomes.push(newItem);
      else d.expectedOutcomes.push(newItem);
      renderTasks(document.getElementById('content'),document.getElementById('controls'));
    }
    if(e.key==='Escape') slot.innerHTML='';
  };
  inp.onblur=()=>{ setTimeout(()=>{ if(slot) slot.innerHTML=''; },200); };
  slot.appendChild(inp);
  inp.focus();
}

function tkEditItem(pid,iid,kind){
  const d=tkData(pid);
  const arr=kind==='task'?d.tasks:kind==='outcome'?d.outcomes:d.expectedOutcomes;
  const item=arr.find(x=>x.id===iid);
  if(!item) return;
  const listId=kind==='task'?`tklist-${pid}`:kind==='outcome'?`tklist-${pid}-out`:`tklist-${pid}-exp`;
  const list=document.getElementById(listId);
  if(!list) return;
  const el=list.querySelector(`.tk-item-text[onclick*="${iid}"], .tk-o-text[onclick*="${iid}"]`);
  if(!el||el.querySelector('input')) return;
  const orig=item.text;
  const inp=document.createElement('input');
  inp.className='tk-inline-input';
  inp.value=orig;
  inp.style.marginTop='0';
  el.replaceWith(inp);
  inp.focus(); inp.select();
  inp.onkeydown=e=>{
    if(e.key==='Enter'){
      item.text=inp.value.trim()||orig;
      renderTasks(document.getElementById('content'),document.getElementById('controls'));
    }
    if(e.key==='Escape') renderTasks(document.getElementById('content'),document.getElementById('controls'));
  };
  inp.onblur=()=>{ item.text=inp.value.trim()||orig; renderTasks(document.getElementById('content'),document.getElementById('controls')); };
}

function tkDelItem(pid,iid,kind){
  const d=tkData(pid);
  if(kind==='task') d.tasks=d.tasks.filter(x=>x.id!==iid);
  else if(kind==='outcome') d.outcomes=d.outcomes.filter(x=>x.id!==iid);
  else d.expectedOutcomes=d.expectedOutcomes.filter(x=>x.id!==iid);
  renderTasks(document.getElementById('content'),document.getElementById('controls'));
}

// ==================== CANVAS VIEW ====================
let _cvZoom=0.55, _cvPan={x:0,y:0}, _cvDrag=null, _cvInited=false;
// cvOrder: { parentId: [childId, childId, ...] } — persists manual reordering
// Default: leads first under VP (Jessica, Mitchell, Hamza, Alexandre, then the rest)
let cvOrder={
  'vp':['L1','L2','L3','m1','t1','t2','t3','t4','t5','t7','t8','t9','t10','t11','t12','t13','t14','m2','v1']
};

function avatarColor(id){
  const colors=['#ff6b35','#34d399','#60a5fa','#a78bfa','#fbbf24','#f472b6','#22d3ee','#f87171','#86efac','#fdba74'];
  let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))&0xffff;
  return colors[h%colors.length];
}
function initials(name){
  const p=name.trim().split(/\s+/);
  return (p[0]?.[0]||'')+(p[1]?.[0]||'');
}

// get children in custom order (falls back to data order)
function cvChildren(pid){
  const ch=getChildren(pid);
  if(!cvOrder[pid]) return ch;
  const ordered=cvOrder[pid].map(id=>ch.find(c=>c.id===id)).filter(Boolean);
  const rest=ch.filter(c=>!cvOrder[pid].includes(c.id));
  return [...ordered,...rest];
}

// move a node left or right among its siblings
function cvMove(id,dir){
  const p=getById(id); if(!p) return;
  const pid=p.reportsTo||'vp';
  const siblings=cvChildren(pid);
  const order=siblings.map(s=>s.id);
  const i=order.indexOf(id); if(i===-1) return;
  const ni=i+dir;
  if(ni<0||ni>=order.length) return;
  [order[i],order[ni]]=[order[ni],order[i]];
  cvOrder[pid]=order;
  _cvInited=true; // keep scroll position
  renderCanvas(document.getElementById('content'),document.getElementById('controls'));
}

function renderCanvas(ct,cl){
  cl.innerHTML=`<button class="btn primary" onclick="openAdd()">+ Add Person</button>
    <span style="flex:1"></span>
    <div class="cn-zoom">
      <button class="btn" onclick="cvZoom(0.15)">＋</button>
      <button class="btn" onclick="cvZoom(-0.15)">－</button>
      <button class="btn" onclick="cvReset()">Reset</button>
    </div>`;

  // ---- layout algorithm ----
  const NODE_W=164, NODE_H=128, GAP_X=20, GAP_Y=80;

  function subtreeW(id){
    const ch=cvChildren(id);
    if(!ch.length) return NODE_W;
    const total=ch.reduce((s,c)=>s+subtreeW(c.id),0);
    return total + GAP_X*(ch.length-1);
  }

  const positions={};
  function layout(id,x,y){
    const ch=cvChildren(id);
    positions[id]={x,y};
    if(!ch.length) return;
    const totalW=ch.reduce((s,c)=>s+subtreeW(c.id),0)+GAP_X*(ch.length-1);
    let cx=x+(NODE_W/2)-(totalW/2);
    ch.forEach(c=>{
      const sw=subtreeW(c.id);
      layout(c.id, cx+(sw-NODE_W)/2, y+NODE_H+GAP_Y);
      cx+=sw+GAP_X;
    });
  }

  layout('vp',0,0);

  const xs=Object.values(positions).map(p=>p.x);
  const ys=Object.values(positions).map(p=>p.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs)+NODE_W;
  const minY=Math.min(...ys), maxY=Math.max(...ys)+NODE_H;
  const W=maxX-minX+80, H=maxY-minY+80;
  const ox=-minX+40, oy=-minY+40;

  // build HTML nodes
  let nodesHTML='';
  const allP=[VP,...data];
  allP.forEach(p=>{
    const pos=positions[p.id];
    if(!pos) return;
    const px=pos.x+ox, py=pos.y+oy;
    const cls=p.id==='vp'?'cn-vp':p.type==='lead'?'cn-lead':'';
    const col=avatarColor(p.id);
    const tags=p.programs?p.programs.slice(0,2).map(pr=>`<span class="tp ${TC[pr]||''}" style="font-size:7px;">${pr}</span>`).join(''):'';
    const editClick=p.id==='vp'?'':`onclick="openEdit('${p.id}')"`;

    // sibling arrows — show for everyone except VP
    let arrows='';
    if(p.id!=='vp'){
      const pid=p.reportsTo||'vp';
      const siblings=cvChildren(pid);
      const idx=siblings.findIndex(s=>s.id===p.id);
      const canL=idx>0, canR=idx<siblings.length-1;
      arrows=`<div class="cn-arrows" onclick="event.stopPropagation()">
        <span class="cn-arr${canL?'':' disabled'}" onclick="${canL?`cvMove('${p.id}',-1)`:''}" title="Move left">◀</span>
        <span class="cn-arr${canR?'':' disabled'}" onclick="${canR?`cvMove('${p.id}',1)`:''}" title="Move right">▶</span>
      </div>`;
    }

    nodesHTML+=`<div class="cn ${cls}" id="cn-${p.id}" style="left:${px}px;top:${py}px;" ${editClick}>
      <div class="cn-avatar" style="background:${col};">${initials(p.name)}</div>
      <div class="cn-name">${esc(p.name)}</div>
      <div class="cn-role">${esc(p.role||'')}</div>
      <div class="cn-badges">${tags}</div>
      <div class="cn-di">${di(p.delegatable||'unknown')}</div>
      ${arrows}
    </div>`;
  });

  // SVG connector lines
  let svgLines='';
  allP.forEach(p=>{
    if(!p.reportsTo) return;
    const pp=positions[p.reportsTo], cp=positions[p.id];
    if(!pp||!cp) return;
    const x1=pp.x+ox+NODE_W/2, y1=pp.y+oy+NODE_H;
    const x2=cp.x+ox+NODE_W/2, y2=cp.y+oy;
    const my=(y1+y2)/2;
    svgLines+=`<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}"
      fill="none" stroke="var(--ba)" stroke-width="1.5" stroke-opacity="0.7"/>`;
  });

  const wrapH=Math.max(H+200, window.innerHeight-180);
  ct.innerHTML=`<div id="canvas-wrap" style="height:${wrapH}px;">
    <div style="width:${Math.ceil(W*_cvZoom)}px;height:${Math.ceil(H*_cvZoom)}px;position:relative;flex-shrink:0;">
      <div id="canvas-stage" style="width:${W}px;height:${H}px;position:absolute;top:0;left:0;">
        <svg id="canvas-svg" viewBox="0 0 ${W} ${H}" style="width:${W}px;height:${H}px;">${svgLines}</svg>
        ${nodesHTML}
      </div>
    </div>
  </div>`;

  _applyCV();

  // center on first open by scrolling
  const wrap=document.getElementById('canvas-wrap');
  if(!_cvInited){
    _cvInited=true;
    requestAnimationFrame(()=>{
      const ww=wrap.offsetWidth;
      wrap.scrollLeft=Math.max(0,(W*_cvZoom-ww)/2);
      wrap.scrollTop=0;
    });
  }

  // drag-to-pan (updates scrollLeft/Top)
  wrap.addEventListener('mousedown',e=>{
    if(e.target.closest('.cn')) return;
    _cvDrag={sx:e.clientX,sy:e.clientY,px:wrap.scrollLeft,py:wrap.scrollTop};
    wrap.classList.add('dragging');
  });
  window.addEventListener('mousemove',e=>{
    if(!_cvDrag) return;
    wrap.scrollLeft=_cvDrag.px-(e.clientX-_cvDrag.sx);
    wrap.scrollTop=_cvDrag.py-(e.clientY-_cvDrag.sy);
  });
  window.addEventListener('mouseup',()=>{ _cvDrag=null; document.getElementById('canvas-wrap')?.classList.remove('dragging'); });

  // wheel zoom (pivot at cursor)
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const delta=e.deltaY>0?-0.08:0.08;
    const rect=wrap.getBoundingClientRect();
    const mx=e.clientX-rect.left+wrap.scrollLeft;
    const my=e.clientY-rect.top+wrap.scrollTop;
    const oldZ=_cvZoom;
    _cvZoom=Math.max(0.3,Math.min(2,_cvZoom+delta));
    _applyCV();
    wrap.scrollLeft=mx*(_cvZoom/oldZ)-(e.clientX-rect.left);
    wrap.scrollTop=my*(_cvZoom/oldZ)-(e.clientY-rect.top);
  },{passive:false});
}

function _applyCV(){
  const stage=document.getElementById('canvas-stage');
  if(stage) stage.style.transform=`scale(${_cvZoom})`;
}
function cvZoom(d){
  const wrap=document.getElementById('canvas-wrap');
  const cx=wrap?(wrap.scrollLeft+wrap.offsetWidth/2):0;
  const cy=wrap?(wrap.scrollTop+wrap.offsetHeight/2):0;
  const oldZ=_cvZoom;
  _cvZoom=Math.max(0.3,Math.min(2,_cvZoom+d));
  _applyCV();
  if(wrap){ wrap.scrollLeft=cx*(_cvZoom/oldZ)-wrap.offsetWidth/2; wrap.scrollTop=cy*(_cvZoom/oldZ)-wrap.offsetHeight/2; }
}
function cvReset(){ _cvZoom=0.55; _cvInited=false; cvOrder={}; renderCanvas(document.getElementById('content'),document.getElementById('controls')); }

function gChk(id){return [...document.querySelectorAll(`#${id} input:checked`)].map(c=>c.value);}
function sChk(id,v){document.querySelectorAll(`#${id} input`).forEach(c=>{c.checked=v.includes(c.value);});}

function popReports(excludeId){
  const sel=document.getElementById('fReports');
  sel.innerHTML=`<option value="vp">You (VP)</option>`;
  data.forEach(p=>{
    if(p.id===excludeId) return;
    sel.innerHTML+=`<option value="${p.id}">${esc(p.name)} — ${esc(p.role)}</option>`;
  });
}

function openAdd(){
  editId=null;
  document.getElementById('mTitle').textContent='Add Person';
  ['fName','fEmail','fRole','fSched','fNotes'].forEach(f=>document.getElementById(f).value='');
  document.getElementById('fType').value='contractor';
  document.getElementById('fDept').value='training';
  document.getElementById('fDel').value='unknown';
  sChk('fProg',[]);sChk('fLoc',[]);
  popReports(null);
  document.getElementById('fReports').value='vp';
  document.getElementById('bDel').style.display='none';
  document.getElementById('mo').classList.add('active');
  document.getElementById('fName').focus();
}

function openEdit(id){
  const p=data.find(x=>x.id===id);
  if(!p) return;
  editId=id;
  document.getElementById('mTitle').textContent='Edit — '+p.name;
  document.getElementById('fName').value=p.name;
  document.getElementById('fEmail').value=p.email||'';
  document.getElementById('fRole').value=p.role||'';
  document.getElementById('fType').value=p.type;
  document.getElementById('fDept').value=p.dept;
  document.getElementById('fSched').value=p.schedule||'';
  document.getElementById('fNotes').value=p.notes||'';
  document.getElementById('fDel').value=p.delegatable||'unknown';
  sChk('fProg',p.programs);sChk('fLoc',p.locations);
  popReports(id);
  document.getElementById('fReports').value=p.reportsTo||'vp';
  document.getElementById('bDel').style.display='inline-block';
  document.getElementById('mo').classList.add('active');
}

function closeM(){document.getElementById('mo').classList.remove('active');editId=null;}

function saveP(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('Name required');return;}
  const obj={name,email:document.getElementById('fEmail').value.trim(),role:document.getElementById('fRole').value.trim(),
    type:document.getElementById('fType').value,dept:document.getElementById('fDept').value,
    programs:gChk('fProg'),locations:gChk('fLoc'),schedule:document.getElementById('fSched').value.trim(),
    notes:document.getElementById('fNotes').value.trim(),delegatable:document.getElementById('fDel').value,
    reportsTo:document.getElementById('fReports').value};
  if(editId){Object.assign(data.find(x=>x.id===editId),obj);}
  else{data.push({id:gid(),...obj});}
  closeM();render();
}

function delP(){
  if(!editId||!confirm('Remove this person?'))return;
  data.filter(p=>p.reportsTo===editId).forEach(p=>{p.reportsTo='vp';});
  data=data.filter(p=>p.id!==editId);
  closeM();render();
}
